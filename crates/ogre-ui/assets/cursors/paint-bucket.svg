<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- White fill + dark outline so the cursor reads on any canvas color. -->
  <g fill="#ffffff" stroke="#1a1a1a" stroke-width="1.3" stroke-linejoin="round" stroke-linecap="round">
    <!-- tipped bucket body, mouth opening toward the lower-left -->
    <path d="M10 3 L21 7 L17.5 17 L6.5 13 Z"/>
    <!-- handle arc over the back -->
    <path d="M12 4 Q18 1 20.5 6.5" fill="none"/>
    <!-- pour stream from the lower-left rim down to the hotspot -->
    <path d="M7 13 Q3.5 16 3 20.5" fill="none"/>
  </g>
  <!-- paint drop at the hotspot (bottom-left ~ 3,21) -->
  <circle cx="3" cy="21" r="1.7" fill="#ffffff" stroke="#1a1a1a" stroke-width="0.8"/>
</svg>
